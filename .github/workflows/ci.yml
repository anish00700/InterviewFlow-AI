name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Backend ──────────────────────────────────────────────
  backend-ci:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: interviewflow-backend/package-lock.json

      - name: Install dependencies
        working-directory: interviewflow-backend
        run: npm ci

      - name: Run tests
        working-directory: interviewflow-backend
        run: npm test

  # ── Frontend ─────────────────────────────────────────────
  frontend-ci:
    name: Frontend — Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: interviewflow-frontend/package-lock.json

      - name: Install dependencies
        working-directory: interviewflow-frontend
        run: npm ci

      - name: Build
        working-directory: interviewflow-frontend
        run: npm run build