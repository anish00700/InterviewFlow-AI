name: CD — Build, Push & Deploy

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/interviewflow

jobs:
  # ── 1. Build & push Docker images to ghcr.io ─────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./interviewflow-backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./interviewflow-frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Deploy to Kubernetes ───────────────────────────────
  # Runs on your local machine (self-hosted runner) where kind is already running.
  # Register your machine: GitHub repo → Settings → Actions → Runners → New self-hosted runner
  deploy:
    name: Deploy to Kubernetes
    runs-on: self-hosted
    needs: build-and-push
    environment: production

    steps:
      # kubectl and kind are already installed on your machine — no setup needed.
      # Images were just pushed to ghcr.io; load them into kind so k8s can use them.
      - name: Load images into kind
        run: |
          docker pull ${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
          docker pull ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
          kind load docker-image ${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }} --name interviewflow
          kind load docker-image ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }} --name interviewflow

      - name: Roll out backend
        run: |
          kubectl set image deployment/backend \
            backend=${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }} \
            -n interviewflow

      - name: Roll out frontend
        run: |
          kubectl set image deployment/frontend \
            frontend=${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }} \
            -n interviewflow

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/backend -n interviewflow --timeout=120s
          kubectl rollout status deployment/frontend -n interviewflow --timeout=120s

      - name: Verify pods are healthy
        run: kubectl get pods -n interviewflow
