name: CD — Build, Push & Deploy

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/interviewflow

jobs:
  # ── 1. Build & push Docker images to ghcr.io ─────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./interviewflow-backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./interviewflow-frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Deploy to Kubernetes ───────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push        # only runs after images are successfully pushed
    environment: production      # enables manual approval gate in GitHub

    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Roll out backend
        run: |
          kubectl set image deployment/backend \
            backend=${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }} \
            -n interviewflow

      - name: Roll out frontend
        run: |
          kubectl set image deployment/frontend \
            frontend=${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }} \
            -n interviewflow

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/backend -n interviewflow --timeout=120s
          kubectl rollout status deployment/frontend -n interviewflow --timeout=120s

      - name: Verify pods are healthy
        run: kubectl get pods -n interviewflow
